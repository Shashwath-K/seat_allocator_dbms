{% extends "allocation/base.html" %}
{% block title %}Edit Student - {{ student.name }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Student Details</h1>
    <p>Modify information for <strong>{{ student.name }}</strong> ({{ student.usn }})</p>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="field-row">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" name="name" id="name" value="{{ student.name }}" required />
            </div>
            <div class="form-group">
                <label for="usn">USN</label>
                <input type="text" name="usn" id="usn" value="{{ student.usn }}" required />
            </div>
        </div>

        <div class="field-row">
            <div class="form-group">
                <label for="batch_id">Batch</label>
                <select name="batch_id" id="batch_id" class="form-select">
                    <option value="">-- No Batch --</option>
                    {% for b in batches %}
                    <option value="{{ b.id }}" {% if student.batch_id==b.id %}selected{% endif %}>
                        {{ b.batch_code }} - {{ b.batch_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select name="gender" id="gender" class="form-select">
                    <option value="M" {% if student.gender=='M' %}selected{% endif %}>Male</option>
                    <option value="F" {% if student.gender=='F' %}selected{% endif %}>Female</option>
                    <option value="O" {% if student.gender=='O' %}selected{% endif %}>Other</option>
                </select>
            </div>
        </div>

        <div class="field-row">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" name="email" id="email" value="{{ student.email }}" />
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" name="phone" id="phone" value="{{ student.phone }}" />
            </div>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
            <input type="checkbox" name="is_present" id="is_present" {% if student.is_present %}checked{% endif %}
                style="width: 20px; height: 20px;">
            <label for="is_present" style="margin-bottom: 0;">Mark as Active (Available for scheduling)</label>
        </div>

        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'database_dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
    .field-row {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .field-row>.form-group {
        flex: 1;
        min-width: 200px;
    }

    .form-select {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
        font-size: .95rem;
        background-color: white;
    }
</style>
{% endblock %}
