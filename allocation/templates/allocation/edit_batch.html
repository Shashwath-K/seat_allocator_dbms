{% extends "allocation/base.html" %}
{% block title %}Edit Batch - {{ batch.batch_code }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Batch Details</h1>
    <p>Modify settings for batch <strong>{{ batch.batch_code }}</strong> ({{ batch.batch_name }})</p>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="field-row">
            <div class="form-group">
                <label for="batch_name">Batch Name</label>
                <input type="text" name="batch_name" id="batch_name" value="{{ batch.batch_name }}" required />
            </div>
            <div class="form-group">
                <label for="batch_code">Batch Code</label>
                <input type="text" name="batch_code" id="batch_code" value="{{ batch.batch_code }}" required />
            </div>
        </div>

        <div class="field-row">
            <div class="form-group">
                <label for="section">Section</label>
                <input type="text" name="section" id="section" value="{{ batch.section }}" placeholder="e.g. A" />
            </div>
            <div class="form-group">
                <label for="academic_year">Academic Year</label>
                <input type="text" name="academic_year" id="academic_year" value="{{ batch.academic_year }}"
                    placeholder="e.g. 2024-25" />
            </div>
            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" name="department" id="department" value="{{ batch.department }}" />
            </div>
        </div>

        <div class="field-row">
            <div class="form-group">
                <label for="max_students">Max Capacity</label>
                <input type="number" name="max_students" id="max_students" value="{{ batch.max_students }}" required />
            </div>
            <div class="form-group">
                <label for="batch_status">Status</label>
                <select name="batch_status" id="batch_status" class="form-select">
                    <option value="upcoming" {% if batch.batch_status=='upcoming' %}selected{% endif %}>Upcoming
                    </option>
                    <option value="ongoing" {% if batch.batch_status=='ongoing' %}selected{% endif %}>Ongoing</option>
                    <option value="completed" {% if batch.batch_status=='completed' %}selected{% endif %}>Completed
                    </option>
                    <option value="suspended" {% if batch.batch_status=='suspended' %}selected{% endif %}>Suspended
                    </option>
                </select>
            </div>
        </div>

        <div class="field-row">
            <div class="form-group">
                <label for="start_date">Start Date</label>
                <input type="date" name="start_date" id="start_date" value="{{ batch.start_date|date:'Y-m-d' }}"
                    required />
            </div>
            <div class="form-group">
                <label for="end_date">End Date</label>
                <input type="date" name="end_date" id="end_date" value="{{ batch.end_date|date:'Y-m-d' }}" required />
            </div>
            <div class="form-group">
                <label for="extended_date">Extended Date (Optional)</label>
                <input type="date" name="extended_date" id="extended_date"
                    value="{{ batch.extended_date|date:'Y-m-d' }}" />
            </div>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
            <input type="checkbox" name="is_active" id="is_active" {% if batch.is_active %}checked{% endif %}
                style="width: 20px; height: 20px;">
            <label for="is_active" style="margin-bottom: 0;">Is Active (Allows adding students)</label>
        </div>

        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'database_dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
    .field-row {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .field-row>.form-group {
        flex: 1;
        min-width: 150px;
    }

    .form-select {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
        font-size: .95rem;
        background-color: white;
    }

    input[type=date] {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
    }
</style>
{% endblock %}
