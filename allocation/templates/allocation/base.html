<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Classroom Management System{% endblock %}</title>
  <style>
    /* ── Reset & base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    /* ── Top nav ── */
    nav {
      background: #1e3a5f;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    nav .brand {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      padding: 14px 0;
      margin-right: auto;
      letter-spacing: .3px;
    }

    nav a {
      color: #a8c4e0;
      text-decoration: none;
      padding: 14px 12px;
      font-size: .88rem;
      transition: color .2s, background .2s;
      border-radius: 4px;
    }

    nav a:hover {
      color: #fff;
      background: rgba(255, 255, 255, .1);
    }

    .user-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .username {
      color: #e2e8f0;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-logout-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-logout-btn:hover {
      background: #e53e3e;
      border-color: #e53e3e;
    }

    nav a.active {
      color: #fff;
      border-bottom: 2px solid #5ea8e0;
    }

    /* ── Page wrapper ── */
    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 20px;
    }

    /* ── Page header ── */
    .page-header {
      background: #1e3a5f;
      color: #fff;
      border-radius: 10px 10px 0 0;
      padding: 20px 28px;
    }

    .page-header h1 {
      font-size: 1.4rem;
    }

    .page-header p {
      font-size: .88rem;
      color: #a8c4e0;
      margin-top: 4px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
      padding: 28px;
    }

    /* ── Flash messages ── */
    .messages {
      margin-bottom: 18px;
    }

    .alert {
      padding: 11px 16px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: .9rem;
      border-left: 4px solid;
    }

    .alert-success {
      background: #e6f9f0;
      border-color: #27ae60;
      color: #1d6e45;
    }

    .alert-error {
      background: #fdecea;
      border-color: #e74c3c;
      color: #7e1c15;
    }

    .alert-warning {
      background: #fffbe6;
      border-color: #f39c12;
      color: #7d5a00;
    }

    /* ── Form elements ── */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #2d3748;
    }

    input[type=text],
    input[type=number] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: .95rem;
      transition: border-color .2s;
    }

    input:focus {
      border-color: #1e3a5f;
      outline: none;
      box-shadow: 0 0 0 3px rgba(30, 58, 95, .12);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: 9px 22px;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .1s;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn-primary {
      background: #1e3a5f;
      color: #fff;
    }

    .btn-primary:hover {
      background: #16304f;
    }

    .btn-success {
      background: #27ae60;
      color: #fff;
    }

    .btn-success:hover {
      background: #229954;
    }

    .btn-danger {
      background: #e74c3c;
      color: #fff;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .btn-secondary {
      background: #adb5bd;
      color: #fff;
      margin-left: 8px;
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: .9rem;
    }

    th {
      background: #1e3a5f;
      color: #fff;
      padding: 10px 14px;
      text-align: left;
    }

    td {
      padding: 9px 14px;
      border-bottom: 1px solid #e2e8f0;
    }

    tr:hover td {
      background: #f7fafc;
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* ── Stat cards (home) ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .07);
      padding: 22px 18px;
      text-align: center;
    }

    .stat-card .num {
      font-size: 2.2rem;
      font-weight: 800;
      color: #1e3a5f;
    }

    .stat-card .lbl {
      font-size: .82rem;
      color: #718096;
      margin-top: 4px;
    }

    /* ── Misc ── */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
    }

    .badge-green {
      background: #d4edda;
      color: #155724;
    }

    .badge-red {
      background: #f8d7da;
      color: #721c24;
    }

    .empty-state {
      color: #a0aec0;
      font-style: italic;
      padding: 14px 0;
    }

    hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 22px 0;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 14px;
    }
  </style>
</head>

<body>

  <nav>
    <span class="brand">🎓 Smart Classroom Management</span>
    {% if user.is_authenticated %}
    <a href="{% url 'home' %}">Dashboard</a>
    <a href="{% url 'add_batch' %}">Batches</a>
    <a href="{% url 'add_student' %}">Students</a>
    <a href="{% url 'add_room' %}">Rooms</a>
    <a href="{% url 'generate_seats' %}">Seats</a>
    <a href="{% url 'allocate_manual' %}">Allotment</a>
    <a href="{% url 'allocation_table' %}">Schedules</a>
    <a href="{% url 'database_dashboard' %}">Database</a>

    <div class="user-info">
      <span class="username">Admin</span>
      <form method="post" action="{% url 'logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="nav-logout-btn">Logout</button>
      </form>
    </div>
    {% else %}
    <a href="{% url 'login' %}">Login</a>
    {% endif %}
  </nav>

  <div class="container">

    {% if messages %}
    <div class="messages" style="margin-top:18px;">
      {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
      {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

  </div>
</body>

</html>
