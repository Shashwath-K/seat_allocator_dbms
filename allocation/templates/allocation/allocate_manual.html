{% extends "allocation/base.html" %}
{% block title %}Manual Allocation{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Manual Allocation</h1>
    <p>Manually assign a specific batch to a room for a dedicated duration.</p>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="field-row">
            <div class="form-group">
                <label for="batch_id">Select Batch</label>
                <select name="batch_id" id="batch_id" class="form-control" required>
                    <option value="">-- Choose Batch --</option>
                    {% for b in batches %}
                    <option value="{{ b.id }}">{{ b.batch_code }} ({{ b.student_count }} students)</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="room_id">Select Room</label>
                <select name="room_id" id="room_id" class="form-control" required>
                    <option value="">-- Choose Room --</option>
                    {% for r in rooms %}
                    <option value="{{ r.id }}">{{ r.room_name }} (Cap: {{ r.capacity }} - {{ r.get_room_type_display }})
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="field-row" style="margin-top: 24px;">
            <div class="form-group">
                <label for="start_date">Start Date</label>
                <input type="date" name="start_date" id="start_date" required />
            </div>
            <div class="form-group">
                <label for="end_date">End Date</label>
                <input type="date" name="end_date" id="end_date" required />
            </div>
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <label>Specific Days</label>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" name="days"
                        value="Mon" checked> Mon</label>
                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" name="days"
                        value="Tue" checked> Tue</label>
                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" name="days"
                        value="Wed" checked> Wed</label>
                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" name="days"
                        value="Thu" checked> Thu</label>
                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" name="days"
                        value="Fri" checked> Fri</label>
                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" name="days"
                        value="Sat"> Sat</label>
                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" name="days"
                        value="Sun"> Sun</label>
            </div>
        </div>

        <div style="margin-top: 32px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-success">Confirm Schedule</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
    .field-row {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }

    .field-row .form-group {
        flex: 1;
        min-width: 250px;
    }
</style>
{% endblock %}
